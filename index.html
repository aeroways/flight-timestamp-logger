<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aero Timestamp</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Aero Timestamp" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    :root{--bg:#07111f;--card:#0f172a;--card2:#111827;--text:#f8fafc;--muted:#94a3b8;--border:#64748b;--green:#22c55e;--cyan:#22d3ee;--danger-dark:#7f1d1d;--input:#020617}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}.app{width:min(100%,1100px);margin:0 auto;padding:16px}h1{text-align:center;margin:8px 0 14px;font-size:clamp(26px,6vw,44px);letter-spacing:1px}.top-panel{display:grid;grid-template-columns:1fr 170px;gap:10px;margin-bottom:12px}input,button{font:inherit}input{width:100%;padding:13px;border-radius:8px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:16px}.date-box{display:flex;align-items:center;justify-content:center;padding:13px;border-radius:8px;border:1px solid var(--border);background:var(--card2);font-weight:700;text-align:center}.header-bar{background:var(--green);color:white;padding:12px;text-align:center;font-weight:900;font-size:clamp(20px,5vw,32px);border-radius:4px;margin:10px 0 12px}.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}button{border:1px solid transparent;border-radius:8px;padding:11px 12px;font-weight:800;cursor:pointer;min-height:44px;white-space:nowrap}button:active{transform:scale(.98)}.btn-main{background:var(--cyan);color:#083344}.btn-clear{background:var(--danger-dark);color:#fecaca;border-color:#f87171}.btn-neutral{background:#334155;color:white;border-color:#64748b}.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px}.activity-list{display:grid;gap:8px;min-width:880px}.row{display:grid;grid-template-columns:115px 1.5fr 110px 140px 140px;gap:8px;align-items:stretch}.cell{border:1px solid var(--border);background:var(--card);border-radius:8px;padding:12px;display:flex;align-items:center;justify-content:center;min-height:50px;text-align:center}.time-cell{font-size:18px;font-weight:900;color:#67e8f9}.activity-cell{font-size:clamp(16px,3vw,22px);font-weight:900;justify-content:center}.manual-input{min-height:50px;text-align:center;font-weight:800}.table-head{font-weight:900;color:white;background:#1e293b;border-color:#94a3b8}.add-panel{display:grid;grid-template-columns:1fr 150px;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid #334155}.note{color:var(--muted);font-size:13px;text-align:center;margin-top:12px;line-height:1.4}@media(max-width:600px){.app{padding:10px}.top-panel{grid-template-columns:1fr}.add-panel{grid-template-columns:1fr}.activity-list{min-width:920px}h1{font-size:30px}}
  </style>
</head>
<body>
  <main class="app">
    <h1>Aero Timestamp</h1>
    <section class="top-panel"><input id="flightNumber" type="text" placeholder="Enter Flight #" /><div class="date-box" id="dateToday"></div></section>
    <div class="header-bar">Time | Tasks/Events</div>
    <section class="controls"><button class="btn-clear" onclick="clearAllTimes()">Clear All Times</button><button class="btn-neutral" onclick="exportCSV()">Export CSV</button></section>
    <section class="table-scroll"><section class="activity-list" id="activityList"></section></section>
    <section class="add-panel"><input id="newActivity" type="text" placeholder="Add new activity" /><button class="btn-main" onclick="addActivity()">Add Activity</button></section>
    <p class="note">On phones, swipe left/right on the table to view all columns. Zulu time is UTC. Data stays on the same device/browser unless website data is cleared.</p>
  </main>
  <script>
    if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("./service-worker.js")})}
    const STORAGE_KEY="flightTimestampData_zulu_v6";
    const defaultActivities=["Shuttle","Airport","Immigration","Gate","FDC Boarding","CC Boarding","A/C Maintenance Release","Pax Boarding Request","Prelim Loadsheet","Final Loadsheet","Cargo Door Closed","Refuel Complete","Fuel Receipt","Last Pax Boarding","Request Cabin Door Close","Doors Closed","RC (Clearance Delivery)","CR (Clearance Received)","SC (Startup Request)","SR (Startup Received)","RP (Request PB)","PR (PB Received)","Out","Off","On","In"];
    let data=loadData();
    function loadData(){const saved=localStorage.getItem(STORAGE_KEY);if(saved){try{return JSON.parse(saved)}catch(e){console.warn("Saved data could not be read. Loading defaults.")}}return{flightNumber:"",activities:defaultActivities.map(name=>({name,zuluTime:"",manualTime:"",phTime:""}))}}
    function saveData(){data.flightNumber=document.getElementById("flightNumber").value;localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
    function formatDateToday(){const now=new Date();document.getElementById("dateToday").textContent=new Intl.DateTimeFormat("en-US",{month:"short",day:"numeric",year:"numeric"}).format(now)}
    function formatTime(date,timeZone){return new Intl.DateTimeFormat("en-GB",{timeZone,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(date)}
    function render(){const list=document.getElementById("activityList");list.innerHTML="";const header=document.createElement("div");header.className="row table-head";header.innerHTML=`<div class="cell">Zulu Time</div><div class="cell">Activity</div><div class="cell">Clear Time</div><div class="cell">Manual Time</div><div class="cell">PH Time</div>`;list.appendChild(header);data.activities.forEach((activity,index)=>{if(activity.zuluTime===undefined)activity.zuluTime=activity.londonTime||"";const row=document.createElement("div");row.className="row";row.innerHTML=`<button class="btn-main" onclick="timestamp(${index})">${activity.zuluTime||"Tap"}</button><div class="cell activity-cell">${escapeHTML(activity.name)}</div><button class="btn-clear" onclick="clearTime(${index})">Clear</button><input class="manual-input" value="${escapeHTML(activity.manualTime||"")}" oninput="updateManualTime(${index}, this.value)" placeholder="Manual" /><div class="cell time-cell">${activity.phTime||""}</div>`;list.appendChild(row)})}
    function timestamp(index){const now=new Date();data.activities[index].zuluTime=formatTime(now,"UTC");data.activities[index].phTime=formatTime(now,"Asia/Manila");saveData();render()}
    function clearTime(index){data.activities[index].zuluTime="";data.activities[index].manualTime="";data.activities[index].phTime="";saveData();render()}
    function clearAllTimes(){data.activities=data.activities.map(activity=>({...activity,zuluTime:"",manualTime:"",phTime:""}));saveData();render()}
    function addActivity(){const input=document.getElementById("newActivity");const name=input.value.trim();if(!name)return;data.activities.push({name,zuluTime:"",manualTime:"",phTime:""});input.value="";saveData();render()}
    function updateManualTime(index,value){data.activities[index].manualTime=value;saveData()}
    function exportCSV(){const flightNumber=document.getElementById("flightNumber").value||"";const header=["Flight Number","Zulu Time","Activity","Manual Time","PH Time"];const rows=data.activities.map(activity=>[flightNumber,activity.zuluTime||"",activity.name,activity.manualTime,activity.phTime]);const csv=[header,...rows].map(row=>row.map(cell=>`"${String(cell).replaceAll('"','""')}"`).join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`aero_timestamp_${flightNumber||"log"}.csv`;a.click();URL.revokeObjectURL(url)}
    function escapeHTML(text){return String(text).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    document.getElementById("flightNumber").value=data.flightNumber||"";document.getElementById("flightNumber").addEventListener("input",saveData);document.getElementById("newActivity").addEventListener("keydown",function(event){if(event.key==="Enter")addActivity()});formatDateToday();render();
  </script>
</body>
</html>
